<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting...</title>
    <script>
        const path = window.location.pathname;
        const match = path.match(/^\/browse\/(.+)$/);
        if (match) {
            const id = match[1];
            window.location.href = `browse/#${id}`;
        }
    </script>
</head>
<body>
    <p>Redirecting...</p>
</body>
</html>
