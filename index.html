<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Redirecting</title>
  <script>
    (function () {
      var hash = window.location.hash;
      if (hash) {
        var raw = hash.slice(1);
        var parts = raw.split('?');
        var idPart = decodeURIComponent(parts[0] || '');
        var queryPart = parts[1] ? ('?' + parts[1]) : '';
        var shortId = idPart.replace(/^urn:p-lod:id:/, '') || 'pompeii';
        window.location.replace('browse/#' + encodeURIComponent(shortId) + queryPart);
      } else {
        window.location.replace('browse/#pompeii');
      }
    })();
  </script>
</head>
<body>
  <p>Redirecting to <a href="browse/#pompeii">/browse/#pompeii</a>...</p>
</body>
</html>
