<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Redirecting</title>
  <script>
    (function () {
      var hash = window.location.hash;
      if (hash) {
        window.location.replace('/browse/' + hash);
      } else {
        window.location.replace('/browse/#pompeii');
      }
    })();
  </script>
</head>
<body>
  <p>Redirecting to <a href="/browse/#pompeii">/browse/#pompeii</a>...</p>
</body>
</html>
